<h2>Admin - All Products</h2>

<table border="1">
  <tr>
    <th>ID</th>
    <th>Name</th>
    <th>Price</th>
    <th>Action</th>
  </tr>

  {% for product in products %}

  <tr>
    <td>{{ product.id }}</td>

    <td>{{ product.name }}</td>

    <td>{{ product.price }}</td>

    <td>
      <a href="/admin/delete-product/{{ product.id }}">
        <button>Delete</button>
      </a>
    </td>
  </tr>

  {% endfor %}
</table>
