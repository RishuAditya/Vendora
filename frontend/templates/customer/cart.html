<h2>Your Cart</h2>

<table border="1">
  <tr>
    <th>Product</th>
    <th>Price</th>
    <th>Quantity</th>
    <th>Action</th>
  </tr>

  {% for item in products %}

  <tr>
    <td>{{ item.name }}</td>
    <td>₹ {{ item.price }}</td>
    <td>{{ item.quantity }}</td>

    <td>
      <a href="/remove-cart/{{ item.cart_id }}">Remove</a>

      <a href="/checkout">
        <button>Checkout</button>
      </a>
    </td>
  </tr>

  {% endfor %}
</table>

<h3>Total: ₹ {{ total }}</h3>
