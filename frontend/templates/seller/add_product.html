<h2>Add Product</h2>

<form method="POST">
  Product Name <br />
  <input type="text" name="name" /><br /><br />

  Price <br />
  <input type="number" name="price" /><br /><br />

  Stock <br />
  <input type="number" name="stock" /><br /><br />

  Image Name (example: phone.png) <br />
  <input type="text" name="image" /><br /><br />

  <button type="submit">Add Product</button>
</form>
